<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConectaAgenda — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="pagina-login">

  <div class="login-container">

    <!-- Logo e nome -->
    <div class="login-header">
      <h1>Conecta<span>Agenda</span></h1>
      <p>Agenda Escolar Digital</p>
    </div>

    <!-- Formulário de login -->
    <form class="login-form" onsubmit="fazerLogin(event)">

      <div class="form-grupo">
        <label for="loginUsuario">Usuário</label>
        <input
          type="text"
          id="loginUsuario"
          placeholder="Digite sua matrícula ou id de Usuário"
          required
        >
      </div>

      <div class="form-grupo">
        <label for="loginSenha">Senha</label>
        <input
          type="password"
          id="loginSenha"
          placeholder="Senha padrão: sua matrícula ou id"
          required
        >
      </div>

      <!-- Mensagem de erro (escondida por padrão) -->
      <div class="login-erro" id="loginErro" style="display: none;">
        Usuário ou senha incorretos.
      </div>

      <button type="submit" class="btn btn-primario login-btn">
        Entrar
      </button>

    </form>

    <!-- Info dos perfis de teste -->
    <div class="login-info">
      <p><strong>Acesso de demonstração:</strong></p>
      <small>Coordenador: coord01 / coord01</small>
      <small>Professor: prof01 / prof01</small>
      <small>Aluno: aluno01 / aluno01</small>
    </div>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
