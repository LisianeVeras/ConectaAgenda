<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConectaAgenda — Painel</title>
   <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Hambúrguer para visualização no celular -->
  <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  <!-- Fundo menu celular -->
  <div class="sidebar-overlay"></div>
  <!-- Layout: menu + conteúdo -->
  <div class="layout">
    <!-- *** MENU LATERAL *** -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Conecta<span>Agenda</span></h1>
        <p>Agenda Escolar Digital</p>
      </div>
      <!-- Links navegáveis -->
      <nav class="sidebar-nav">
        <a href="painel.html" class="ativo">
          <span class="icone">🏠</span> Painel Inicial
        </a>
        <a href="usuarios.html">
          <span class="icone">👤</span> Usuários
        </a>
        <a href="turmas.html">
          <span class="icone">📚</span> Turmas
        </a>
        <a href="avisos.html">
          <span class="icone">💬</span> Avisos
        </a>
        <a href="frequencia.html">
          <span class="icone">📋</span> Frequência
        </a>
        <a href="desenvolvimento.html">
          <span class="icone">⭐</span> Desenvolvimento
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="fazerLogout()">🚪 Sair</button>
      </div>
    </aside>
    <!-- *** CONTEÚDO PRINCIPAL *** -->
    <main class="conteudo-principal">
      <div class="pagina-header">
        <h2 id="saudacao">📊 Painel Inicial</h2>
        <p id="subtitulo">Visão geral da sua agenda escolar</p>
      </div>
      <!-- Cards contadores (preenchido pelo JS conforme o perfil) -->
      <div class="stats-grid" id="statsGrid"></div>
      <!-- Avisos recentes -->
      <div class="card">
        <div class="card-header">
          <h3>📝 Avisos Recentes</h3>
        </div>
        <div id="avisosRecentes">
          <div class="vazio">
            <div class="vazio-icone">📭</div>
            <p>Nenhum aviso ainda.</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/painel.js"></script>
</body>
</html>
